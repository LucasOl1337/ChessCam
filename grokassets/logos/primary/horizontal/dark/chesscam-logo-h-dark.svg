<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" fill="none">
  <rect width="1920" height="1080" fill="#0D1B2A"/>
  <!-- Camera lens + chess -->
  <g transform="translate(580, 240)">
    <circle cx="200" cy="200" r="140" fill="none" stroke="#E8D5B7" stroke-width="18"/>
    <circle cx="200" cy="200" r="90" fill="none" stroke="#00BCD4" stroke-width="8"/>
    <!-- Chess pieces simplified -->
    <rect x="160" y="160" width="80" height="80" fill="#2E7D32" opacity="0.7"/>
  </g>
  <text x="960" y="720" font-family="Georgia, serif" font-size="82" fill="#E8D5B7" letter-spacing="4" text-anchor="middle">ChessCam</text>
</svg>